<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flashcards SRS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Flashcards SRS</h1>
    <div class="muted">Private • Sync • Swipe study</div>
  </header>

  <!-- LOGIN -->
  <section class="card" id="loginCard">
    <h2>Login</h2>
    <div class="row">
      <input id="email" type="email" placeholder="Email" autocomplete="email">
      <input id="password" type="password" placeholder="Password" autocomplete="current-password">
      <button id="btnLogin">Login</button>
      <button class="ghost" id="btnLogout" style="display:none;">Logout</button>
    </div>
    <div class="muted small" id="loginStatus"></div>
  </section>

  <!-- ADD -->
  <section class="card" id="addCard" style="display:none;">
    <h2>Add a word / phrase</h2>
    <div class="row">
      <input id="phrase" type="text" placeholder="Type any language word or sentence…">
      <button id="btnTranslate">Translate + Save</button>
    </div>
    <div class="muted small" id="addStatus"></div>

    <div class="preview" id="preview" style="display:none;">
      <div><span class="muted">Detected:</span> <b id="pLang">—</b></div>
      <div><span class="muted">English:</span> <b id="pEn">—</b></div>
      <div class="muted">Examples:</div>
      <ul id="pExamples"></ul>
    </div>
  </section>

  <!-- STUDY -->
  <section class="card" id="studyCard" style="display:none;">
    <div class="studyTop">
      <h2>Study</h2>
      <div class="muted small" id="stats">—</div>
    </div>

    <div class="swipeWrap">
      <div id="swipeCard" class="swipeCard">
        <div class="label muted small">Front</div>
        <div class="front" id="frontText">—</div>
        <div class="muted small" id="frontMeta"></div>

        <div class="divider"></div>

        <div id="backArea" style="display:none;">
          <div class="label muted small">Back (English)</div>
          <div class="back" id="backText">—</div>
          <div class="muted small" id="backExamples"></div>
        </div>

        <div class="hint muted small" id="swipeHint">Tap “Reveal”, then swipe ⟵ Again / ⟶ Easy</div>
      </div>
    </div>

    <div class="row">
      <button id="btnReveal">Reveal</button>
      <button class="ghost" id="btnAgain">Again (Left)</button>
      <button class="ghost" id="btnEasy">Easy (Right)</button>
    </div>
  </section>

  <footer class="muted small">
    Tip: Works best when you “Install to Home Screen” on mobile (PWA style).
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
